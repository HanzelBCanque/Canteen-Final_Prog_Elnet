<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management - QU!CKSERVE</title>
    <!-- Tailwind CSS with custom color config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#8bb7fc',
                        brandLight: '#f7f9fc'
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-brandLight font-sans text-gray-800 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="bg-brandBlue w-64 flex flex-col justify-between shadow-lg z-10 shrink-0">
        <div>
            <!-- Logo -->
            <div class="p-6 flex items-center gap-2 text-2xl font-black italic tracking-tight text-black">
                <span>QU!CKSERVE</span>
                <i class="fa-solid fa-bell-concierge text-xl"></i>
            </div>

            <!-- Navigation -->
            <nav class="mt-4 flex flex-col gap-2 pl-6 font-bold text-lg text-black">
                <a href="#" class="block py-3 px-6 rounded-l-full border border-transparent hover:bg-white/20 transition-colors">Dashboard</a>
                
                <!-- Active Item -->
                <div class="relative">
                    <div class="absolute right-0 w-4 h-full bg-brandLight"></div> <!-- Blends with background -->
                    <a href="#" class="relative block py-3 px-6 bg-brandLight text-black rounded-l-full shadow-sm z-10">Menu</a>
                </div>
                
                <a href="#" class="block py-3 px-6 rounded-l-full border border-transparent hover:bg-white/20 transition-colors">Stock</a>
                <a href="#" class="block py-3 px-6 rounded-l-full border border-transparent hover:bg-white/20 transition-colors">Report</a>
            </nav>
        </div>

        <!-- Logout -->
        <div class="p-6 border-t border-blue-400/30">
            <a href="#" class="flex items-center gap-2 text-black font-bold hover:opacity-75 transition-opacity">
                <i class="fa-solid fa-arrow-right-from-bracket rotate-180"></i> Log Out
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-y-auto">
        
        <!-- Header -->
        <header class="flex justify-end items-center p-6 bg-brandLight shrink-0">
            <div class="flex items-center gap-2 text-lg">
                <i class="fa-solid fa-circle-user text-2xl"></i>
                <span class="font-semibold text-gray-700">Welcome, <span class="text-red-500 italic">Admin</span>!</span>
            </div>
        </header>

        <!-- Body -->
        <div class="px-10 pb-10 flex-1 flex flex-col gap-6 max-w-7xl w-full mx-auto">
            
            <!-- Top Banner -->
            <div class="bg-brandBlue rounded-3xl p-8 shadow-sm">
                <h1 class="text-3xl font-black italic text-black mb-1">Menu</h1>
                <p class="text-black font-bold text-lg">Manage items, prices, and live stock.</p>
            </div>

            <!-- Stats Row -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Stat Card 1 -->
                <div class="bg-white rounded-xl p-6 shadow-sm flex flex-col gap-2">
                    <div class="text-xs font-bold text-gray-500 flex items-center gap-2 uppercase tracking-wide">
                        <span class="w-2 h-2 rounded-full bg-blue-400"></span> Total Items
                    </div>
                    <div class="text-3xl font-black">8</div>
                </div>
                
                <!-- Stat Card 2 -->
                <div class="bg-white rounded-xl p-6 shadow-sm flex flex-col gap-2">
                    <div class="text-xs font-bold text-gray-500 flex items-center gap-2 uppercase tracking-wide">
                        <span class="w-2 h-2 rounded-full bg-yellow-500"></span> Low Stock
                    </div>
                    <div class="text-3xl font-black">1</div>
                </div>
                
                <!-- Stat Card 3 -->
                <div class="bg-white rounded-xl p-6 shadow-sm flex flex-col gap-2">
                    <div class="text-xs font-bold text-gray-500 flex items-center gap-2 uppercase tracking-wide">
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span> Inventory Value
                    </div>
                    <div class="text-3xl font-black">₱9,220</div>
                </div>
            </div>

            <!-- Controls Row -->
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mt-2">
                <!-- Search Box -->
                <div class="relative w-full md:w-96">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" placeholder="Search menu items..." class="w-full pl-11 pr-4 py-3 rounded-full border border-gray-100 shadow-sm focus:ring-2 focus:ring-blue-400 text-sm outline-none">
                </div>

                <!-- Category Filters -->
                <div class="flex bg-white rounded-full shadow-sm p-1 border border-gray-100">
                    <button class="px-5 py-2 rounded-full hover:bg-gray-50 text-sm font-medium text-gray-600 transition-colors">All</button>
                    <button class="px-5 py-2 rounded-full bg-blue-500 text-white text-sm font-medium shadow-sm transition-colors">Foods</button>
                    <button class="px-5 py-2 rounded-full hover:bg-gray-50 text-sm font-medium text-gray-600 transition-colors">Drinks</button>
                    <button class="px-5 py-2 rounded-full hover:bg-gray-50 text-sm font-medium text-gray-600 transition-colors">Snacks</button>
                </div>

                <!-- Add Button -->
                <button class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-full font-medium shadow-sm transition-colors flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-plus"></i> Add Item
                </button>
            </div>

            <!-- Table Container -->
            <div class="bg-white rounded-2xl p-6 shadow-sm mt-2 flex-1 overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse min-w-[800px]">
                    <thead>
                        <tr class="text-gray-400 font-bold uppercase border-b border-gray-100 text-xs tracking-wider">
                            <th class="pb-4 px-4 font-medium w-24">ID</th>
                            <th class="pb-4 px-4 font-medium w-1/3">Name</th>
                            <th class="pb-4 px-4 font-medium w-32">Category</th>
                            <th class="pb-4 px-4 font-medium w-32">Price</th>
                            <th class="pb-4 px-4 font-medium w-32">Stock</th>
                            <th class="pb-4 px-4 font-medium text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Placeholder Row 1 -->
                        <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                            <td class="py-4 px-4 text-gray-400 font-mono text-xs">M-000</td>
                            <td class="py-4 px-4 font-medium">[Data Empty]</td>
                            <td class="py-4 px-4"><span class="bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded font-medium">[Empty]</span></td>
                            <td class="py-4 px-4 font-medium text-gray-600">₱0.00</td>
                            <td class="py-4 px-4 font-bold">0</td>
                            <td class="py-4 px-4 text-right">
                                <div class="flex justify-end gap-2">
                                    <button class="w-8 h-8 rounded border border-gray-200 text-gray-400 flex items-center justify-center hover:bg-gray-50">-</button>
                                    <button class="w-8 h-8 rounded border border-gray-200 text-gray-400 flex items-center justify-center hover:bg-gray-50">+</button>
                                    <button class="w-8 h-8 rounded border border-gray-200 text-gray-400 flex items-center justify-center hover:bg-gray-50"><i class="fa-solid fa-pen text-xs"></i></button>
                                    <button class="w-8 h-8 rounded border border-gray-200 text-gray-400 flex items-center justify-center hover:bg-gray-50"><i class="fa-solid fa-trash-can text-xs"></i></button>
                                </div>
                            </td>
                        </tr>
                        <!-- Additional placeholder row to maintain height -->
                        <tr class="border-b border-transparent">
                            <td colspan="6" class="py-10 text-center text-gray-300 italic">... Waiting for backend data ...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

</body>
</html>
